version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fraud_detection_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: fraud_detection
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: fraud_detection_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+mysqlconnector://root:password@mysql:3306/fraud_detection
      - MODEL_DIR=/app/saved_models
      - LOG_LEVEL=INFO
    volumes:
      - ./saved_models:/app/saved_models
      - ./dataset:/app/dataset
    depends_on:
      mysql:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: fraud_detection_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  mysql_data:
